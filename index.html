<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO -->
  <title>AKYRAWAVE – AIが生み出す音楽</title>
  <meta name="description" content="AKYRAWAVEはAIによって生み出された謎めいたアーティスト。Dance Pop、EDM、J-Pop、バラードなどジャンルを越えた楽曲を展開。" />
  <meta name="keywords" content="AKYRAWAVE, アキラウェーブ, AI音楽, Dance Pop, EDM, J-Pop, シンセポップ, 日本語バラード" />
  <link rel="canonical" href="https://takachan-hub.github.io/AKYRAWAVE/" />

  <!-- OGP -->
  <meta property="og:type"        content="website" />
  <meta property="og:title"       content="AKYRAWAVE – AIが生み出す音楽" />
  <meta property="og:description" content="AIと人間の境界で生まれた音楽。謎めいた存在、AKYRAWAVE。" />
  <meta property="og:image"       content="https://takachan-hub.github.io/AKYRAWAVE/logo.jpeg" />
  <meta property="og:url"         content="https://takachan-hub.github.io/AKYRAWAVE/" />
  <meta property="og:locale"      content="ja_JP" />

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary" />
  <meta name="twitter:title"       content="AKYRAWAVE – AIが生み出す音楽" />
  <meta name="twitter:description" content="AIと人間の境界で生まれた音楽。謎めいた存在、AKYRAWAVE。" />
  <meta name="twitter:image"       content="https://takachan-hub.github.io/AKYRAWAVE/logo.jpeg" />

  <!-- Favicon -->
  <link rel="icon" type="image/jpeg" href="logo.jpeg" />
  <link rel="apple-touch-icon"       href="logo.jpeg" />

  <!-- JSON-LD 構造化データ -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "MusicGroup",
    "name": "AKYRAWAVE",
    "description": "AIによって生み出された謎めいた音楽アーティスト。Dance Pop、EDM、J-Pop、バラードなどジャンルを越えた楽曲を展開。",
    "url": "https://takachan-hub.github.io/AKYRAWAVE/",
    "image": "https://takachan-hub.github.io/AKYRAWAVE/logo.jpeg",
    "genre": ["Dance Pop", "EDM", "J-Pop", "Synth Pop", "Ballad"]
  }
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <canvas id="canvas"></canvas>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <!-- Nav: ヒーローを過ぎてから出現 -->
  <nav aria-label="サイトナビゲーション">
    <a href="#" class="nav-logo">
      <img src="logo.jpeg" alt="AKYRAWAVE ロゴ" />
      <span class="nav-logo-text">AKYRAWAVE</span>
    </a>
  </nav>

  <!-- Hero -->
  <section id="hero">
    <div class="hero-logo-wrap">
      <div class="hero-logo-glow"></div>
      <img src="logo.jpeg" alt="AKYRAWAVE" class="hero-logo" />
    </div>
    <p class="hero-eyebrow">AI × Music</p>
    <h1 class="hero-title">AKYRAWAVE</h1>
    <p class="hero-sub">音楽の向こう側から。<br />A sound from the other side.</p>
    <div class="hero-divider"></div>
  </section>

  <!-- Concept -->
  <section id="concept" aria-label="AKYRAWAVEのコンセプト">
    <span class="section-label reveal">Identity</span>
    <p class="concept-text reveal">
      その正体は、誰も知らない。<br />
      <strong>AIと人間の境界</strong>で生まれた音楽が、<br />
      静かに世界へと広がっていく。<br /><br />
      Dance Popからバラードへ。<br />
      80s シンセから J-Rock まで。<br />
      <strong>ジャンルを越えた声</strong>が、あなたに届く。
    </p>
  </section>

  <footer>
    <div class="footer-logo-wrap">
      <img src="logo.jpeg" alt="AKYRAWAVE" class="footer-logo-img" />
      <span class="footer-logo-text">AKYRAWAVE</span>
    </div>
    <p class="footer-copy">© 2026 AKYRAWAVE. All rights reserved.</p>
  </footer>

  <script src="main.js"></script>
</body>
</html>
